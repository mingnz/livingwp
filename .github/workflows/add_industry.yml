name: Add Industry

on:
  workflow_dispatch:
    inputs:
      industry_name:
        description: "The name of the new industry"
        required: true
        type: string

jobs:
  add-industry:
    runs-on: ubuntu-latest
    outputs:
      industry_key: ${{ steps.add_industry_to_config.outputs.industry_key }}
      branch_name: ${{ steps.add_industry_to_config.outputs.branch_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Add industry using Python function
        id: add_industry_to_config
        run: |
          INDUSTRY_KEY=$(uv run python -c "
          from src.livingwp.utils.files import add_industry
          import sys
          key = add_industry('${{ inputs.industry_name }}')
          print(key)
          ")
          echo "industry_key=$INDUSTRY_KEY" >> $GITHUB_OUTPUT
          echo "branch_name=chore/add-industry-$INDUSTRY_KEY" >> $GITHUB_OUTPUT
          echo "Added industry '$INDUSTRY_KEY' to industries.json"

      - name: Create Pull Request        
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: Add ${{ inputs.industry_name }} to industries  (${{ github.run_id }})"
          title: "Add ${{ inputs.industry_name }} and generate article"
          body: |
            This PR was automatically generated by the add industry action.

            ## Changes
            - Added new entry to industry list
            - Created initial article
            - Generated on: ${{ github.run_id }}

            Please review the changes before merging.
          branch: ${{ steps.add_industry_to_config.outputs.branch_name }}
          delete-branch: true
          draft: false

  run-agent:    
    uses: ./.github/workflows/run_agent.yml
    needs: add-industry
    with:
      article_filter: ${{ needs.add-industry.outputs.industry_key }}
      branch_name: ${{ needs.add-industry.outputs.branch_name }}
    secrets: inherit
