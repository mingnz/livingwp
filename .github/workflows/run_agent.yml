name: Update whitepapers

on:
  workflow_dispatch:
    inputs:
      article_filter:
        description: "Filter for articles to update (optional)"
        required: false
        default: ""
  workflow_call:
    inputs:
      article_filter:
        required: false
        type: string
      branch_name:
        type: string
        required: false
    secrets:
      OPENAI_API_KEY:
        required: true

env:
  # Sets the default model name used for the research agent
  RESEARCH_MODEL: ${{ vars.RESEARCH_MODEL || 'gpt-5.4-2026-03-05' }}
  # Sets the default instruction file for the research agent
  RESEARCH_INSTRUCTIONS_FILENAME: ${{ vars.RESEARCH_INSTRUCTIONS_FILENAME || 'instructions_research.md' }}
  #Enables / disables streaming for agent run
  STREAMING_ENABLED: ${{ vars.STREAMING_ENABLED || 'True' }}

  BRANCH_NAME: ${{ inputs.branch_name || format('chore/article-update-{0}', github.run_number)}}

jobs:
  update-articles:
    runs-on: ubuntu-latest

    steps:      
      - name: Checkout repository
        if: ${{ !inputs.branch_name }} 
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}          

      - name: Checkout branch
        if: ${{ inputs.branch_name }} 
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.branch_name }} 

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate OpenAI credentials
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not set. Add it to repository secrets or pass it to the reusable workflow." >&2
            exit 1
          fi

      - name: Run livingwp update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run livingwp "${{ inputs.article_filter }}"

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Create Pull Request
        if:  ${{ !inputs.branch_name && steps.changes.outputs.changes == 'true' }} 
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: Auto-update articles (${{ github.run_id }})"
          title: "chore: 🔄 Generate new articles"
          body: |
            This PR was automatically generated by the livingwp update process.

            ## Changes
            - Updated article content based on latest research
            - Generated on: ${{ github.run_id }}

            Please review the changes before merging.
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          draft: false

      - name: Commit changes to PR
        if:  ${{ inputs.branch_name && steps.changes.outputs.changes == 'true' }} 
        uses: devops-infra/action-commit-push@master
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          commit_prefix: "chore"
          commit_message: "Generate articles"
