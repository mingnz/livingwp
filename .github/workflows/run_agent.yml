name: Update whitepapers

on:
  workflow_dispatch:
    inputs:
      article_filter:
        description: "Filter for articles to update (optional)"
        required: false
        default: ""
  workflow_call:
    inputs:
      article_filter:
        required: false
        type: string
      branch_name:
        type: string
        required: false
    secrets:
      OPENAI_API_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  # Sets the default model name used for the research agent
  RESEARCH_MODEL: ${{ vars.RESEARCH_MODEL || 'gpt-5.4-2026-03-05' }}
  # Sets the default instruction file for the research agent
  RESEARCH_INSTRUCTIONS_FILENAME: ${{ vars.RESEARCH_INSTRUCTIONS_FILENAME || 'instructions_research.md' }}
  #Enables / disables streaming for agent run
  STREAMING_ENABLED: ${{ vars.STREAMING_ENABLED || 'True' }}

  BRANCH_NAME: ${{ inputs.branch_name || format('chore/article-update-{0}', github.run_number)}}

jobs:
  update-articles:
    runs-on: ubuntu-latest

    steps:      
      - name: Checkout repository
        if: ${{ !inputs.branch_name }} 
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}          

      - name: Checkout branch
        if: ${{ inputs.branch_name }} 
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.branch_name }} 

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate OpenAI credentials
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not set. Add it to repository secrets or pass it to the reusable workflow." >&2
            exit 1
          fi

      - name: Run livingwp update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LIVINGWP_USAGE_REPORT_PATH: ${{ runner.temp }}/livingwp-usage-report.json
        run: uv run livingwp "${{ inputs.article_filter }}"

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Create Pull Request
        if:  ${{ !inputs.branch_name && steps.changes.outputs.changes == 'true' }} 
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: generate article updates (${{ github.run_id }})"
          title: "chore: 🔄 generate article updates"
          body: |
            This PR was automatically generated by the livingwp update process.

            ## Changes
            - Updated article content based on latest research
            - Generated on: ${{ github.run_id }}

            Please review the changes before merging.
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          draft: false

      - name: Commit changes to PR
        if:  ${{ inputs.branch_name && steps.changes.outputs.changes == 'true' }} 
        uses: devops-infra/action-commit-push@master
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          commit_prefix: "chore"
          commit_message: "generate article updates"

      - name: Resolve pull request number
        id: pr_number
        if: ${{ inputs.branch_name || steps.create_pr.outputs['pull-request-number'] }}
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
          CREATED_PR_NUMBER: ${{ steps.create_pr.outputs['pull-request-number'] }}
        with:
          script: |
            const createdPrNumber = process.env.CREATED_PR_NUMBER;
            if (createdPrNumber) {
              core.setOutput("number", String(createdPrNumber));
              return;
            }

            const branchName = process.env.BRANCH_NAME;
            if (!branchName) {
              core.setOutput("number", "");
              return;
            }

            const { owner, repo } = context.repo;
            const pullRequests = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              head: `${owner}:${branchName}`,
              per_page: 100,
            });

            if (pullRequests.length === 0) {
              core.warning(`No open pull request found for branch ${branchName}.`);
              core.setOutput("number", "");
              return;
            }

            core.setOutput("number", String(pullRequests[0].number));

      - name: Comment generation usage on PR
        if: ${{ steps.pr_number.outputs.number != '' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr_number.outputs.number }}
          USAGE_REPORT_PATH: ${{ runner.temp }}/livingwp-usage-report.json
          CHANGES_DETECTED: ${{ steps.changes.outputs.changes }}
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- livingwp-usage-report -->";
            const reportPath = process.env.USAGE_REPORT_PATH;
            if (!fs.existsSync(reportPath)) {
              core.setFailed(`Usage report not found at ${reportPath}`);
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            const prNumber = Number(process.env.PR_NUMBER);
            const changesDetected = process.env.CHANGES_DETECTED === "true";
            const totals = report.totals || {};

            const formatInteger = (value) =>
              new Intl.NumberFormat("en-US").format(Number(value || 0));
            const formatUsd = (value) => {
              if (value === null || value === undefined) {
                return "n/a";
              }
              return `$${Number(value).toFixed(4)}`;
            };

            const costLabel = totals.cost_complete
              ? formatUsd(totals.estimated_cost_usd)
              : `${formatUsd(totals.estimated_cost_usd)} (partial)`;

            const articleRows = (report.articles || []).map((article) => {
              const articleCost = article.cost_complete
                ? formatUsd(article.estimated_cost_usd)
                : "n/a";
              return [
                article.industry,
                `\`${article.model}\``,
                formatInteger(article.total_tokens),
                formatInteger(article.input_tokens),
                formatInteger(article.output_tokens),
                formatInteger(article.web_search_calls),
                articleCost,
              ];
            });

            const table = articleRows.length
              ? [
                  "| Industry | Model | Total tokens | Input | Output | Web searches | Estimated cost |",
                  "| --- | --- | ---: | ---: | ---: | ---: | ---: |",
                  ...articleRows.map((row) => `| ${row.join(" | ")} |`),
                ].join("\n")
              : "_No articles were processed._";

            const unpricedModels =
              Array.isArray(report.unpriced_models) && report.unpriced_models.length > 0
                ? `\n\nCost could not be calculated for: ${report.unpriced_models
                    .map((model) => `\`${model}\``)
                    .join(", ")}.`
                : "";

            const body = [
              marker,
              "## Generation Usage",
              "",
              `- Generated at: ${report.generated_at}`,
              `- Content changes detected: ${changesDetected ? "yes" : "no"}`,
              `- Articles processed: ${formatInteger(totals.articles)}`,
              `- Requests: ${formatInteger(totals.requests)}`,
              `- Total tokens: ${formatInteger(totals.total_tokens)}`,
              `- Cached input tokens: ${formatInteger(totals.cached_input_tokens)}`,
              `- Reasoning tokens: ${formatInteger(totals.reasoning_tokens)}`,
              `- Web search calls: ${formatInteger(totals.web_search_calls)}`,
              `- Estimated cost: ${costLabel}`,
              "",
              table,
              "",
              "Estimated cost is derived from token usage plus OpenAI web-search call pricing.",
            ].join("\n") + unpricedModels;

            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existingComment = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });
